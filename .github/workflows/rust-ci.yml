name: Rust CI

on:
  push:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "images/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "images/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build And Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-xcb-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libzmq3-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-stable-v1
          cache-on-failure: true

      - name: Compile all targets and run all tests
        run: cargo test --workspace --all-targets --all-features --locked
