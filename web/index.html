<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <title>RSA Session Viewer</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #111217;
      }
      #viewer_canvas {
        width: 100%;
        height: 100%;
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="viewer_canvas"></canvas>
    <script type="module">
      import init, { start } from "./viewer.js";

      async function boot() {
        await init();
        await start("viewer_canvas");
      }

      boot();
    </script>
  </body>
</html>
